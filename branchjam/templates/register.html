{% extends "base.html" %}
{% block content %}
<div style="max-width:480px;margin:40px auto;">
  <div style="text-align:center;margin-bottom:32px;">
    <h1 style="font-size:56px;color:var(--amber);">Bread &amp; Jam</h1>
    <p style="margin-top:4px;">Create your account</p>
  </div>

  <div class="card">
    <form method="post" enctype="multipart/form-data" style="display:flex;flex-direction:column;gap:14px;">
      <div class="form-group">
        <label>Username *</label>
        <input name="username" required autocomplete="username" placeholder="your_username" />
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input name="password" type="password" required autocomplete="new-password" placeholder="min. 4 characters" />
      </div>
      <div class="form-group">
        <label>Account Type *</label>
        <select name="role" required>
          <option value="creator">Creator — make &amp; share music</option>
          <option value="producer">Producer — license &amp; buy tracks</option>
        </select>
      </div>

      <hr style="border:none;border-top:1px solid var(--border);" />
      <p style="font-size:12px;color:var(--muted);">Optional profile info — you can fill this in later.</p>

      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio" placeholder="Tell the world about yourself..." style="min-height:56px;"></textarea>
      </div>
      <div class="form-group">
        <label>Genres (comma-separated)</label>
        <input name="genres" placeholder="Hip-Hop, Jazz, Lo-fi" />
      </div>
      <div class="form-group">
        <label>Instruments (comma-separated)</label>
        <input name="instruments" placeholder="Guitar, Piano, Drums" />
      </div>
      <div class="form-group">
        <label>Profile Picture (JPG, PNG, WEBP)</label>
        <input type="file" name="profile_picture" id="avatar-input" accept="image/jpeg,image/png,image/webp" />
        <img id="avatar-preview" alt="Preview" style="display:none;margin-top:8px;width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--border);" />
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account</button>
    </form>
  </div>

  <p style="text-align:center;margin-top:16px;font-size:13px;">
    Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
  </p>
</div>
{% endblock %}
