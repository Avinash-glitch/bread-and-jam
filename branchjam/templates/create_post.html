{% extends "base.html" %}
{% block content %}
<h2>Create Post</h2>
<form method="post">
  <label>Title</label><input name="title" required />
  <label>Description</label><textarea name="description"></textarea>
  <label>Project</label>
  <select name="project_id" required>
    <option value="">Select project</option>
    {% for p in projects %}
      <option value="{{ p['id'] }}" {% if selected_project_id and p['id']|string == selected_project_id %}selected{% endif %}>{{ p["title"] }}</option>
    {% endfor %}
  </select>
  <button type="submit" name="submit" value="load_tracks">Load Tracks</button>

  {% if versions %}
    <h3>Tracks in Project</h3>
    {% for v in versions %}
      <div class="row">
        <input type="checkbox" name="track_id" value="{{ v['id'] }}" />
        <span>{{ v["branch_name"] }} v{{ v["version_number"] }} - {{ v["notes"] or "No notes" }}</span>
        <label>Price</label>
        <input name="price_{{ v['id'] }}" type="number" step="0.01" min="0" value="10" />
      </div>
    {% endfor %}
  {% endif %}

  <button type="submit" name="submit" value="create_post">Create Post</button>
</form>
<p><a href="{{ url_for('marketplace.marketplace_index') }}">Back to Marketplace</a></p>
{% endblock %}
