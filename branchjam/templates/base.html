<!doctype html>
<html>
  <head>
    <title>{{ title }}</title>
    <style>
      :root {
        --bg-main: #242424;
        --card-bg: #1f1f1f;
        --backside-bg: #334155;
        --border-color: #202c3a;
        --text-main: #dddddd;
        --text-muted: #7b8794;
        --accent: #2563eb;
        --accent-soft: rgba(37, 99, 235, 0.18);
        --warning-bg: #2b2620;
        --warning-border: #8a6736;
      }

      * { box-sizing: border-box; }

      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        margin: 30px;
        max-width: 980px;
        background: var(--bg-main);
        color: var(--text-main);
      }

      a { color: var(--accent); text-decoration: none; font-weight: 500; }
      a:hover { color: #4f7bff; }

      form { margin: 10px 0 20px; display: flex; gap: 10px; flex-wrap: wrap; }
      input, textarea, select, button { padding: 9px 10px; border-radius: 8px; }
      input, textarea, select {
        min-width: 220px;
        background: #101418;
        color: var(--text-main);
        border: 1px solid var(--border-color);
      }
      input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      textarea { min-height: 56px; }

      button {
        border: 1px solid transparent;
        background: #1a1a1a;
        color: var(--text-main);
        cursor: pointer;
        transition: border-color 0.2s ease, transform 0.1s ease;
      }
      button:hover { border-color: #646466; }
      button:active { transform: translateY(1px); }

      .card {
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 14px;
        margin: 10px 0;
        background: var(--card-bg);
      }
      .card:hover {
        border-color: var(--accent);
        box-shadow: 0 0 20px var(--accent-soft);
      }

      .flash {
        background: var(--warning-bg);
        border: 1px solid var(--warning-border);
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
      }
      .row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
      h2, h3 { margin-bottom: 6px; }
      section { margin-top: 24px; }
      ul { margin: 8px 0 0 20px; }
      label { font-size: 12px; color: var(--text-muted); }

      @media (max-width: 720px) {
        body { margin: 18px; }
        input, textarea, select { min-width: 100%; }
      }
    </style>
  </head>
  <body>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const inputs = document.querySelectorAll("input[type='file'][data-preview-target]");
        inputs.forEach((input) => {
          input.addEventListener("change", function () {
            const targetId = input.getAttribute("data-preview-target");
            const player = document.getElementById(targetId);
            if (!player || !input.files || !input.files.length) {
              return;
            }
            const fileUrl = URL.createObjectURL(input.files[0]);
            player.src = fileUrl;
            player.style.display = "block";
          });
        });
      });
    </script>
  </body>
</html>
