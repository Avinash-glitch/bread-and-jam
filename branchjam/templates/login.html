{% extends "base.html" %}
{% block content %}
<h2>Login</h2>
<form method="post">
  <label>Username</label><input name="username" required />
  <label>Password</label><input name="password" type="password" required />
  <button type="submit">Login</button>
</form>
<p>No account? <a href="{{ url_for('auth.register') }}">Register</a></p>
{% endblock %}
